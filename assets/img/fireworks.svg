<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <style>
    .fw-1 { animation: explode 2.5s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .fw-2 { animation: explode 3s infinite cubic-bezier(0.25, 1, 0.5, 1) 0.5s; }
    .fw-3 { animation: explode 2.8s infinite cubic-bezier(0.25, 1, 0.5, 1) 1.2s; }
    @keyframes explode {
      0% { transform: scale(0.1); opacity: 1; stroke-width: 3; }
      50% { opacity: 1; stroke-width: 2; }
      100% { transform: scale(1.1); opacity: 0; stroke-width: 0.5; }
    }
    path { transform-origin: 0 0; }
  </style>
